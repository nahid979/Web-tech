<body>

    <!-- Unordered List -->
    <ul>
        <li>data 1</li>
        <li>data 2</li>
        <li>data 3</li>
    </ul>

    <!-- Ordered List -->
    <ol>
        <li>data 1</li>
        <li>data 2</li>

            </ul>
        </li>
    </ul>

</html>
