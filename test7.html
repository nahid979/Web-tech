<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
</head>
<body>

<center>
    <h1>Registration</h1>
</center>

<form>

<table width="100%" border="0">

<tr>


<td valign="top" width="40%">
<fieldset>
<legend><b>General Information</b></legend>

<table>

<tr>
<td>First Name </td>
<td> : <input type="text" size="20"></td>
</tr>

<tr>
<td>Last Name </td>
<td> : <input type="text" size="20"></td>
</tr>

<tr>
<td>Gender </td>
<td>
: <input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</td>
</tr>

<tr>
<td>Father's Name </td>
<td>
 : <input type="text" size="20">
<input type="file">
</td>
</tr>

<tr>
<td>Mother's Name </td>
<td> : <input type="text" size="20"></td>
</tr>

<tr>
<td>Blood Group </td>
<td>
: <select>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>
</td>
</tr>

<tr>
<td>Religion </td>
<td>
 : <select>
<option>Islam</option>
<option>Hindu</option>
<option>Christian</option>
<option>Buddhist</option>
</select>
</td>
</tr>

</table>

</fieldset>
</td>


<td valign="top" width="35%">
<fieldset>
<legend><b>Contact Information</b></legend>

<table>

<tr>
<td>Email </td>
<td> : <input type="email"></td>
</tr>

<tr>
<td>Phone/Mobile </td>
<td> : <input type="text"></td>
</tr>

<tr>
<td>Website </td>
<td> : <input type="text"></td>
</tr>

<tr>
<td valign="top">Present Address </td>
<td>
 : <select>
<option>Bangladesh</option>
</select>

<select>
<option>Dhaka</option>
</select>
</td>
</tr>

<tr>
<td valign="top">Address :</td>
<td>
<textarea rows="5" cols="20">Road/Street/City</textarea>
</td>
</tr>

<tr>
<td>Post Code </td>
<td> : <input type="text"></td>
</tr>

</table>

</fieldset>
</td>


<td valign="top" width="25%">
<fieldset>
<legend><b>Account Information</b></legend>

<table>

<tr>
<td>Username </td>
<td> : <input type="text"></td>
</tr>

<tr>
<td>Password </td>
<td> : <input type="password"></td>
</tr>

<tr>
<td>Confirm Password </td>
<td> : <input type="password"></td>
</tr>

<tr>
<td colspan="2">
<br>
<input type="submit" value="Register">
<input type="reset" value="Reset">
</td>
</tr>

</table>

</fieldset>
</td>

</tr>

</table>

</form>

</body>
</html>
